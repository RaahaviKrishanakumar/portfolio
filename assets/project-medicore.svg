<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">MediCore mobile app screenshot in phone mockup</title>
  <desc id="desc">A portrait phone mockup containing the MediCore staff login screenshot with medical background, status bar, login panel, and sign in button.</desc>
  <defs>
