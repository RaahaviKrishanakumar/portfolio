      <stop offset="0" stop-color="#d8ecff"/>
      <stop offset=".48" stop-color="#8fbce9"/>
      <stop offset="1" stop-color="#20315f"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2=".9" y2="1">
